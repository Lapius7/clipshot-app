name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build clipshot.exe
        run: |
          $env:CGO_ENABLED="0"
          $version = $env:GITHUB_REF_NAME -replace '^v',''
          go build -trimpath -ldflags="-H windowsgui -s -w -X main.version=$version" -o clipshot.exe ./cmd/clipshot/...

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v',''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=$version" "/DOutputDir=installer" installer.iss

      - name: Generate SHA256 checksums
        run: |
          (Get-FileHash clipshot.exe -Algorithm SHA256).Hash.ToLower() + "  clipshot.exe" | Out-File -Encoding ascii SHA256SUMS.txt
          Get-ChildItem installer/clipshot-setup-*.exe | ForEach-Object {
            (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower() + "  " + $_.Name
          } | Out-File -Encoding ascii -Append SHA256SUMS.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            clipshot.exe
            installer/clipshot-setup-*.exe
            SHA256SUMS.txt
          draft: false
          prerelease: false
